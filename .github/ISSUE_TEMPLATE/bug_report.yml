name: Bug Report
description: Report a bug or unexpected behavior
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this?
      placeholder: |
        1. Run `bun start`
        2. Type "..."
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened? Include error messages or screenshots if relevant.
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating System
      placeholder: "macOS 15.2, Ubuntu 24.04, Windows 11, etc."
    validations:
      required: true

  - type: input
    id: bun-version
    attributes:
      label: Bun Version
      description: Output of `bun --version`
      placeholder: "1.2.0"
    validations:
      required: true

  - type: dropdown
    id: provider
    attributes:
      label: LLM Provider
      options:
        - Ollama (local)
        - OpenAI
        - Anthropic
        - Google
        - xAI
        - Moonshot
        - DeepSeek
        - OpenRouter
        - LiteLLM
    validations:
      required: true

  - type: input
    id: model
    attributes:
      label: Model Name
      description: Which model were you using?
      placeholder: "ollama:granite3-dense:2b, gpt-4.1, claude-sonnet-4-5-20250514, etc."

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Anything else that might help (logs, config, etc.).
