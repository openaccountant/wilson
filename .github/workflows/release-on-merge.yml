name: Release on Merge

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  # Manually dispatched npm-auth probe: republishing the current (already
  # published) version proves auth without burning a release — a working
  # trusted-publisher config yields "cannot publish over existing version",
  # a broken one yields ENEEDAUTH. HTTP logging shows the OIDC exchange.
  publish-diagnostic:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Probe npm trusted-publishing auth
        run: |
          npm install -g npm@latest
          npm --version
          env | grep -c ACTIONS_ID_TOKEN || echo "OIDC env MISSING"
          npm publish --provenance --access public --loglevel http 2>&1 || true

  release:
    runs-on: ubuntu-latest
    # Push events only; skip release commits to prevent infinite loops
    if: ${{ github.event_name == 'push' && !startsWith(github.event.head_commit.message, 'chore(release):') }}
    steps:
      # The default GITHUB_TOKEN cannot bypass the main-branch ruleset, so the
      # release commit/tag are pushed with a token minted for the release-bot
      # GitHub App, which is on the ruleset's bypass list.
      - uses: actions/create-github-app-token@v2
        id: release-bot
        with:
          app-id: ${{ secrets.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ steps.release-bot.outputs.token }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2.23"

      - name: Install and test
        run: |
          bun install --frozen-lockfile
          bun run typecheck
          FAIL=0
          for f in src/__tests__/*.test.ts; do
            if ! bun test "$f" 2>&1; then FAIL=1; fi
          done
          exit $FAIL

      - name: Determine version bump from commits
        id: bump
        run: |
          LATEST_TAG=$(git tag -l 'v*' --sort=-v:refname | head -n1 || echo "")

          if [ -z "$LATEST_TAG" ]; then
            echo "No existing tags — using all commits"
            RANGE="HEAD"
          else
            RANGE="${LATEST_TAG}..HEAD"
          fi

          COMMITS=$(git log --pretty=format:"%s" $RANGE)

          if [ -z "$COMMITS" ]; then
            echo "No new commits since $LATEST_TAG"
            echo "bump=none" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Determine bump level from conventional commit prefixes
          BUMP="none"

          if echo "$COMMITS" | grep -qiE "^BREAKING CHANGE:|^[a-z]+(\(.+\))?!:"; then
            BUMP="major"
          elif echo "$COMMITS" | grep -qiE "^feat(\(.+\))?:"; then
            BUMP="minor"
          elif echo "$COMMITS" | grep -qiE "^fix(\(.+\))?:|^perf(\(.+\))?:"; then
            BUMP="patch"
          fi

          echo "bump=$BUMP" >> "$GITHUB_OUTPUT"
          echo "latest_tag=$LATEST_TAG" >> "$GITHUB_OUTPUT"
          echo "Detected bump: $BUMP"

      - name: Bump version in package.json
        if: steps.bump.outputs.bump != 'none'
        id: version
        run: |
          BUMP="${{ steps.bump.outputs.bump }}"
          CURRENT=$(jq -r .version package.json)

          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"

          case "$BUMP" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac

          NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"

          jq --arg v "$NEW_VERSION" '.version = $v' package.json > package.json.tmp
          mv package.json.tmp package.json

          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "previous=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "Bumped $CURRENT → $NEW_VERSION ($BUMP)"

      - name: Generate changelog
        if: steps.bump.outputs.bump != 'none'
        env:
          VERSION: ${{ steps.version.outputs.version }}
          LATEST_TAG: ${{ steps.bump.outputs.latest_tag }}
        run: |
          DATE=$(date +%Y-%m-%d)

          if [ -z "$LATEST_TAG" ]; then
            RANGE="HEAD"
          else
            RANGE="${LATEST_TAG}..HEAD"
          fi

          # Group commits by type
          FEATURES=$(git log --pretty=format:"- %s (%h)" $RANGE | grep -iE "^- feat" || true)
          FIXES=$(git log --pretty=format:"- %s (%h)" $RANGE | grep -iE "^- fix|^- perf" || true)
          OTHER=$(git log --pretty=format:"- %s (%h)" $RANGE | grep -viE "^- feat|^- fix|^- perf|^- chore|^- ci|^- docs|^- style|^- test|^- build" || true)

          {
            printf "## [v%s] — %s\n\n" "$VERSION" "$DATE"

            if [ -n "$FEATURES" ]; then
              printf "### Features\n\n%s\n\n" "$FEATURES"
            fi

            if [ -n "$FIXES" ]; then
              printf "### Fixes\n\n%s\n\n" "$FIXES"
            fi

            if [ -n "$OTHER" ]; then
              printf "### Other\n\n%s\n\n" "$OTHER"
            fi
          } > /tmp/changelog-entry.md

          cp /tmp/changelog-entry.md /tmp/release-notes.md

          # Prepend to CHANGELOG.md
          if [ ! -f CHANGELOG.md ]; then
            echo "# Changelog" > CHANGELOG.md
            echo "" >> CHANGELOG.md
          fi

          {
            head -n 1 CHANGELOG.md
            echo ""
            cat /tmp/changelog-entry.md
            tail -n +2 CHANGELOG.md
          } > CHANGELOG.tmp
          mv CHANGELOG.tmp CHANGELOG.md

      - name: Commit release
        if: steps.bump.outputs.bump != 'none'
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json CHANGELOG.md
          git commit -m "chore(release): v${VERSION}"
          git push

      - name: Create tag and GitHub Release
        if: steps.bump.outputs.bump != 'none'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          TAG="v${VERSION}"
          git tag "$TAG"
          git push origin "$TAG"
          gh release create "$TAG" \
            --title "$TAG" \
            --notes-file /tmp/release-notes.md

      - uses: actions/setup-node@v6
        if: steps.bump.outputs.bump != 'none'
        with:
          node-version: 22

      # Auth via npm trusted publishing (OIDC) — no NPM_TOKEN. Requires this
      # repo + workflow to be configured as a trusted publisher on npmjs.com,
      # and npm >= 11.5.1 (node 22 bundles npm 10, hence the upgrade).
      - name: Publish to npm
        if: steps.bump.outputs.bump != 'none'
        run: |
          npm install -g npm@latest
          npm publish --provenance --access public

      - name: File docs issue
        if: steps.bump.outputs.bump != 'none'
        env:
          GH_TOKEN: ${{ secrets.DOCS_ISSUE_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          DOCS_REPO="open-accountant/app"
          gh issue create \
            --repo "$DOCS_REPO" \
            --title "docs: update for Open Accountant CLI v${VERSION}" \
            --body-file /tmp/release-notes.md \
          || echo "::warning::Could not create docs issue — is DOCS_ISSUE_TOKEN configured?"
