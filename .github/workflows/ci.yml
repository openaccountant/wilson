name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2.22"

      - run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: |
          # Run each test file in its own process to prevent mock.module
          # contamination across files (Bun shares module cache in-process)
          FAIL=0
          for f in src/__tests__/*.test.ts; do
            if ! bun test "$f" 2>&1; then
              FAIL=1
            fi
          done
          exit $FAIL
